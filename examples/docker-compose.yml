services:
  node:
    image: usernodelabs/usernode:latest
    container_name: dapp-node
    env_file:
      - path: ../.env
        required: false
    environment:
      USERNODE_GENESIS_URL: ${GENESIS_URL:-https://static.usernodelabs.org/testnet/genesis.json}
      PEER_LIST_URL: ${SEEDLIST_URL:-https://static.usernodelabs.org/testnet/seedlist.txt}
      RUST_LOG: info
    command:
      - "--work-dir"
      - "/var/lib/usernode"
      - "--port"
      - "3000"
      - "--wallet-owner"
      - "${APP_PUBKEY}"
      - "--wallet-owner"
      - "${ECHO_APP_PUBKEY}"
    volumes:
      - node-data:/var/lib/usernode
    networks:
      - proxy-network
    restart: unless-stopped

  dapp-examples:
    build:
      context: ..
      dockerfile: examples/Dockerfile
    container_name: dapp-examples
    env_file:
      - path: ../.env
        required: false
    environment:
      PORT: "8000"
      NODE_RPC_URL: "http://node:3000"
      SNAPSHOT_DIR: "/app/data"
      VIRTUAL_HOST: "dapps.usernodelabs.org"
      VIRTUAL_PORT: "8000"
      LETSENCRYPT_HOST: "dapps.usernodelabs.org"
    expose:
      - "8000"
    volumes:
      - sands-data:/app/data
    networks:
      - proxy-network
    restart: unless-stopped

volumes:
  sands-data:
  node-data:

networks:
  proxy-network:
    external: true
