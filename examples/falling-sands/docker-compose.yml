services:
  falling-sands:
    build:
      context: ..
      dockerfile: falling-sands/Dockerfile
    container_name: falling-sands
    environment:
      PORT: "3333"
      SNAPSHOT_DIR: "/app/falling-sands/data"
    ports:
      - "3333:3333"
    volumes:
      - sands-data:/app/falling-sands/data
    restart: unless-stopped

volumes:
  sands-data:
