name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euxo pipefail
            REPO_DIR=${{ secrets.DEPLOY_PATH }}
            cd "$REPO_DIR"
            echo "==> Working directory: $(pwd)"
            echo "==> Git status:"
            git status --short

            echo "==> Writing .env from secrets..."
            # SANDS_APP_PUBKEY / OM_APP_PUBKEY / USERNAMES_PUBKEY are public
            # addresses (no secret-key counterparts) but routed through GH
            # secrets to keep the .env writer single-sourced.
            cat > .env <<'ENVEOF'
            APP_PUBKEY=${{ secrets.APP_PUBKEY }}
            APP_SECRET_KEY=${{ secrets.APP_SECRET_KEY }}
            VOTE_ENCRYPT_SEED=${{ secrets.VOTE_ENCRYPT_SEED }}
            OM_ADMIN_PUBKEY=${{ secrets.OM_ADMIN_PUBKEY }}
            OM_APP_PUBKEY=${{ secrets.OM_APP_PUBKEY }}
            ECHO_APP_PUBKEY=${{ secrets.ECHO_APP_PUBKEY }}
            ECHO_APP_SECRET_KEY=${{ secrets.ECHO_APP_SECRET_KEY }}
            SANDS_APP_PUBKEY=${{ secrets.SANDS_APP_PUBKEY }}
            USERNAMES_PUBKEY=${{ secrets.USERNAMES_PUBKEY }}
            ENVEOF
            sed -i 's/^[[:space:]]*//' .env
            echo "==> .env written ($(wc -l < .env) lines)"

            echo "==> Pulling latest code..."
            git pull --recurse-submodules
            git submodule update --init --recursive

            echo "==> Stopping old containers..."
            docker compose down || true
            cd "$REPO_DIR/examples/falling-sands"
            docker compose down 2>/dev/null || true
            docker stop falling-sands 2>/dev/null || true
            docker rm falling-sands 2>/dev/null || true

            echo "==> Deploying combined examples server..."
            cd "$REPO_DIR/examples"
            # --env-file ../.env feeds compose-time ${VAR} substitution (e.g.
            # --wallet-owner ${APP_PUBKEY}). Without it, compose only reads
            # examples/.env (doesn't exist) and substitutes empty strings,
            # which crashes the node sidecar with a bech32 parse error.
            COMPOSE="docker compose --env-file ../.env"
            $COMPOSE down || true
            echo "==> Pulling latest node sidecar image..."
            $COMPOSE pull node
            $COMPOSE up -d --build 2>&1
            $COMPOSE ps
            echo "==> Combined examples server started."

            echo "==> All running containers:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo "==> Deploy complete!"
