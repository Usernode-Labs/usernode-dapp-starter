name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euxo pipefail
            REPO_DIR=${{ secrets.DEPLOY_PATH }}
            cd "$REPO_DIR"
            echo "==> Working directory: $(pwd)"
            echo "==> Git status:"
            git status --short

            echo "==> Writing .env from secrets..."
            cat > .env <<'ENVEOF'
            APP_PUBKEY=${{ secrets.APP_PUBKEY }}
            APP_SECRET_KEY=${{ secrets.APP_SECRET_KEY }}
            VOTE_ENCRYPT_SEED=${{ secrets.VOTE_ENCRYPT_SEED }}
            OM_ADMIN_PUBKEY=${{ secrets.OM_ADMIN_PUBKEY }}
            ENVEOF
            sed -i 's/^[[:space:]]*//' .env
            echo "==> .env written ($(wc -l < .env) lines)"

            echo "==> Pulling latest code..."
            git pull --recurse-submodules
            git submodule update --init --recursive

            echo "==> Preparing build context..."
            cd "$REPO_DIR/examples"
            cp "$REPO_DIR/usernode-bridge.js" .
            cp "$REPO_DIR/usernode-usernames.js" .
            cp "$REPO_DIR/index.html" .
            ls -la usernode-bridge.js usernode-usernames.js index.html

            # ── Blue-green deploy ──────────────────────────────────────────
            # Determine which slot is currently active
            if docker compose -p dapp-blue ps --status running -q 2>/dev/null | grep -q .; then
              OLD_SLOT=blue
              NEW_SLOT=green
            else
              OLD_SLOT=green
              NEW_SLOT=blue
            fi
            echo "==> Blue-green: old=$OLD_SLOT, deploying new=$NEW_SLOT"

            # Build and start the new slot alongside the old
            docker compose -p "dapp-${NEW_SLOT}" build
            docker compose -p "dapp-${NEW_SLOT}" up -d

            # Poll health endpoint until the engine is fully initialized
            NEW_CID=$(docker compose -p "dapp-${NEW_SLOT}" ps -q dapp-examples)
            echo "==> Waiting for new container to become healthy..."
            HEALTHY=false
            for i in $(seq 1 60); do
              if docker exec "$NEW_CID" curl -sf http://localhost:8000/__health >/dev/null 2>&1; then
                HEALTHY=true
                echo "==> New container healthy after ~$((i * 5))s"
                break
              fi
              sleep 5
            done

            if [ "$HEALTHY" != "true" ]; then
              echo "==> ERROR: new container not healthy after 5 minutes, rolling back"
              docker compose -p "dapp-${NEW_SLOT}" logs --tail=50
              docker compose -p "dapp-${NEW_SLOT}" down || true
              exit 1
            fi

            # New container is live — stop old slot and any legacy containers
            docker compose -p "dapp-${OLD_SLOT}" down 2>/dev/null || true
            docker compose down 2>/dev/null || true
            cd "$REPO_DIR"
            docker compose down 2>/dev/null || true
            cd "$REPO_DIR/examples/falling-sands"
            docker compose down 2>/dev/null || true
            docker stop falling-sands 2>/dev/null || true
            docker rm falling-sands 2>/dev/null || true

            echo "==> Deploy complete! Active slot: $NEW_SLOT"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
